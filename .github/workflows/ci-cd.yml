name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 8.0.x
  NODE_VERSION: 22
  API_SOLUTION: NotesApi.sln
  API_TEST_PROJECT: api/tests/NotesApi.Tests/NotesApi.Tests.csproj
  UI_DIRECTORY: ui/src

jobs:
  api:
    name: Build and test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API dependencies
        run: dotnet restore "${API_SOLUTION}"

      - name: Build API
        run: dotnet build "${API_SOLUTION}" --configuration Release --no-restore

      - name: Test API
        run: >
          dotnet test "${API_TEST_PROJECT}"
          --configuration Release
          --no-build
          --logger "trx;LogFileName=api-tests.trx"
          --results-directory TestResults

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: TestResults/*.trx
          if-no-files-found: ignore

  ui:
    name: Build and test UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.UI_DIRECTORY }}/package-lock.json

      - name: Install UI dependencies
        working-directory: ${{ env.UI_DIRECTORY }}
        run: npm ci

      - name: Prepare Nuxt types
        working-directory: ${{ env.UI_DIRECTORY }}
        run: npx nuxi prepare

      - name: Test UI
        working-directory: ${{ env.UI_DIRECTORY }}
        run: npm test

      - name: Build UI
        working-directory: ${{ env.UI_DIRECTORY }}
        env:
          NUXT_API_BASE_URL: http://localhost:5294
        run: npm run build

  docker:
    name: Validate Docker images
    runs-on: ubuntu-latest
    needs:
      - api
      - ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ttrpg-api:ci

      - name: Build UI image
        uses: docker/build-push-action@v5
        with:
          context: ui/src
          file: ui/src/Dockerfile
          push: false
          tags: ttrpg-ui:ci

  docker-push:
    name: Push Docker images
    runs-on: ubuntu-latest
    needs: docker
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify GCP secrets
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          ARTIFACT_REGISTRY_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
        run: |
          missing=()
          [ -z "$GCP_SA_KEY" ] && missing+=("GCP_SA_KEY")
          [ -z "$GCP_PROJECT_ID" ] && missing+=("GCP_PROJECT_ID")
          [ -z "$GCP_REGION" ] && missing+=("GCP_REGION")
          [ -z "$ARTIFACT_REGISTRY_REPO" ] && missing+=("ARTIFACT_REGISTRY_REPO")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::GCP deploy is enabled but these secrets are missing: ${missing[*]}"
            echo "Add them under Settings → Secrets and variables → Actions (repository or production environment)."
            exit 1
          fi

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GCP_REGION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}/api:${{ github.sha }}

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ui/src
          file: ui/src/Dockerfile
          push: true
          tags: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}/ui:${{ github.sha }}

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: docker-push
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify GCP secrets
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          ARTIFACT_REGISTRY_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
          TTRPG_JWT_KEY: ${{ secrets.TTRPG_JWT_KEY }}
          TTRPG_SEED_ADMIN_PASSWORD: ${{ secrets.TTRPG_SEED_ADMIN_PASSWORD }}
        run: |
          missing=()
          [ -z "$GCP_SA_KEY" ] && missing+=("GCP_SA_KEY")
          [ -z "$GCP_PROJECT_ID" ] && missing+=("GCP_PROJECT_ID")
          [ -z "$GCP_REGION" ] && missing+=("GCP_REGION")
          [ -z "$ARTIFACT_REGISTRY_REPO" ] && missing+=("ARTIFACT_REGISTRY_REPO")
          [ -z "$TTRPG_JWT_KEY" ] && missing+=("TTRPG_JWT_KEY")
          [ -z "$TTRPG_SEED_ADMIN_PASSWORD" ] && missing+=("TTRPG_SEED_ADMIN_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::GCP deploy is enabled but these secrets are missing: ${missing[*]}"
            exit 1
          fi

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy API to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ttrpg-api
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}/api:${{ github.sha }}
          region: ${{ secrets.GCP_REGION }}
          env_vars: |
            TTRPG_JWT_KEY=${{ secrets.TTRPG_JWT_KEY }}
            TTRPG_SEED_ADMIN_PASSWORD=${{ secrets.TTRPG_SEED_ADMIN_PASSWORD }}
