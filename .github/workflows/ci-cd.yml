name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 8.0.x
  NODE_VERSION: 22
  API_SOLUTION: NotesApi.sln
  API_TEST_PROJECT: api/tests/NotesApi.Tests/NotesApi.Tests.csproj
  UI_DIRECTORY: ui/src

jobs:
  api:
    name: Build and test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API dependencies
        run: dotnet restore "${API_SOLUTION}"

      - name: Build API
        run: dotnet build "${API_SOLUTION}" --configuration Release --no-restore

      - name: Test API
        run: >
          dotnet test "${API_TEST_PROJECT}"
          --configuration Release
          --no-build
          --logger "trx;LogFileName=api-tests.trx"
          --results-directory TestResults

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: TestResults/*.trx
          if-no-files-found: ignore

  ui:
    name: Build and test UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.UI_DIRECTORY }}/package-lock.json

      - name: Install UI dependencies
        working-directory: ${{ env.UI_DIRECTORY }}
        run: npm ci

      - name: Prepare Nuxt types
        working-directory: ${{ env.UI_DIRECTORY }}
        run: npx nuxi prepare

      - name: Test UI
        working-directory: ${{ env.UI_DIRECTORY }}
        run: npm test

      - name: Build UI
        working-directory: ${{ env.UI_DIRECTORY }}
        env:
          NUXT_API_BASE_URL: http://localhost:5294
        run: npm run build

  docker:
    name: Validate Docker images
    runs-on: ubuntu-latest
    needs:
      - api
      - ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build --file Dockerfile --tag ttrpg-api:${{ github.sha }} .

      - name: Build UI image
        run: docker build --file ui/src/Dockerfile --tag ttrpg-ui:${{ github.sha }} ui/src

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      TTRPG_JWT_KEY: ${{ secrets.TTRPG_JWT_KEY }}
      TTRPG_SEED_ADMIN_PASSWORD: ${{ secrets.TTRPG_SEED_ADMIN_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH DEPLOY_SSH_PRIVATE_KEY TTRPG_JWT_KEY TTRPG_SEED_ADMIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Repository secret ${name} is required for production deployment."
              missing=1
            fi
          done

          if [ -z "${DEPLOY_PORT}" ]; then
            echo "DEPLOY_PORT was not set; defaulting to SSH port 22."
          fi

          exit "${missing}"

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          port="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "${port}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Sync application files
        shell: bash
        run: |
          set -euo pipefail

          port="${DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "${port}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${port}" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "api/**/bin/" \
            --exclude "api/**/obj/" \
            --exclude "ui/src/.nuxt/" \
            --exclude "ui/src/.output/" \
            --exclude "ui/src/node_modules/" \
            --exclude ".env" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Write production environment
        shell: bash
        run: |
          set -euo pipefail

          port="${DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "${port}" "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && umask 077 && tee .env >/dev/null" <<EOF
          TTRPG_JWT_KEY=${TTRPG_JWT_KEY}
          TTRPG_SEED_ADMIN_PASSWORD=${TTRPG_SEED_ADMIN_PASSWORD}
          EOF

      - name: Start production services
        shell: bash
        run: |
          set -euo pipefail

          port="${DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "${port}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && docker compose up -d --build --remove-orphans && docker image prune -f"
