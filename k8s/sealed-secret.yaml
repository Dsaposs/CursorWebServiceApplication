# SealedSecret — safe to commit to git.
#
# This file is generated by scripts/seal-secrets.ps1 using the Bitnami
# Sealed Secrets controller and kubeseal CLI. The encrypted values below
# are decryptable ONLY by the Sealed Secrets controller running in your cluster.
#
# Prerequisites (one-time cluster setup):
#   kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.27.3/controller.yaml
#
# To regenerate this file with new secret values run:
#   .\scripts\seal-secrets.ps1
#
# DO NOT manually edit the encryptedData values — they will be invalid.
# DO NOT replace this file with a plain k8s Secret containing real credentials.
#
# For local cluster development (kind / minikube) without Sealed Secrets,
# apply the plain secret directly (do not commit with real values):
#   kubectl apply -f k8s/secret.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ttrpg-api-secret
  namespace: ttrpg
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    # These placeholder values must be replaced by running scripts/seal-secrets.ps1
    # against your real cluster before deploying to production.
    Jwt__Key: PLACEHOLDER_RUN_SEAL_SECRETS_SCRIPT
    Seed__AdminPassword: PLACEHOLDER_RUN_SEAL_SECRETS_SCRIPT
  template:
    metadata:
      name: ttrpg-api-secret
      namespace: ttrpg
    type: Opaque
