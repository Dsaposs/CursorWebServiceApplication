apiVersion: apps/v1
kind: Deployment
metadata:
  name: ttrpg-api
  namespace: ttrpg
spec:
  # SQLite uses a single writable database file, so keep this at 1 replica.
  replicas: 1
  selector:
    matchLabels:
      app: ttrpg-api
  template:
    metadata:
      labels:
        app: ttrpg-api
    spec:
      containers:
        - name: ttrpg-api
          image: ttrpg-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ConnectionStrings__DefaultConnection
              value: Data Source=/data/ttrpg.db
            - name: Jwt__Issuer
              value: TtrpgApi
            - name: Jwt__Audience
              value: TtrpgApi
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: ttrpg-api-secret
                  key: Jwt__Key
            - name: Seed__AdminPassword
              valueFrom:
                secretKeyRef:
                  name: ttrpg-api-secret
                  key: Seed__AdminPassword
            - name: Cors__AllowedOrigins__0
              value: http://localhost:3000
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: ttrpg-sqlite-data
