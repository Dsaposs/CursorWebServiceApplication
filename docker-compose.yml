# ─────────────────────────────────────────────────────────────────────────────
# TTRPG Table — local development stack
#
# Services:
#   postgres  — primary database (port 5432)
#   redis     — SignalR backplane + cache (port 6379)
#   api       — ASP.NET Core 8 backend (port 5294)         v2.0.0
#   ui        — Nuxt 4 BFF + frontend (port 3000)          v2.0.0
#   mobile    — Nuxt 3 + Ionic mobile web preview (port 3001) v0.1.0
#   ollama    — local LLM server (port 11434)
#   llm       — FastAPI oracle microservice (port 8000)    v0.1.0
#
# Start everything:  docker compose up -d
# Stop:              docker compose down
#
# LAN access: run scripts/start-app.cmd (auto-detects LAN_HOST in .env) or set
# LAN_HOST in .env to your machine's IPv4 address, then restart the stack.
# Published ports bind 0.0.0.0 so phones/tablets on the same Wi-Fi can connect.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: pgvector/pgvector:pg16
    labels:
      com.ttrpg.service: postgres
      com.ttrpg.version: "16"
    environment:
      POSTGRES_USER: ttrpg
      POSTGRES_PASSWORD: ttrpg_dev
      POSTGRES_DB: ttrpg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttrpg"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    labels:
      com.ttrpg.service: redis
      com.ttrpg.version: "7"
    command: redis-server --protected-mode no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    labels:
      com.ttrpg.service: api
      com.ttrpg.version: "2.0.0"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DATABASE_URL: "Host=postgres;Port=5432;Database=ttrpg;Username=ttrpg;Password=ttrpg_dev"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      Jwt__Key: "TtrpgApi-Dev-Signing-Key-Min-32-Chars-Long!"
      Jwt__Issuer: "TtrpgApi"
      Jwt__Audience: "TtrpgApi"
      Seed__AdminPassword: "Password1"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      Cors__AllowedOrigins__1: "http://localhost:3001"
      Cors__AllowedOrigins__2: "http://${LAN_HOST:-127.0.0.1}:3000"
      Cors__AllowedOrigins__3: "http://${LAN_HOST:-127.0.0.1}:3001"
      Cors__AllowLocalNetwork: "true"
      # Exposed to the /api/version endpoint for other services
      UI_VERSION: "2.0.0"
      MOBILE_VERSION: "0.1.0"
      LLM_VERSION: "0.1.0"
    ports:
      - "0.0.0.0:5294:5294"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5294/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    labels:
      com.ttrpg.service: ui
      com.ttrpg.version: "2.0.0"
    environment:
      NUXT_API_BASE_URL: http://api:5294
      NUXT_LLM_BASE_URL: http://llm:8000
      UI_VERSION: "2.0.0"
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      api:
        condition: service_healthy

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
      args:
        NUXT_API_BASE_URL: "http://${LAN_HOST:-127.0.0.1}:5294"
    labels:
      com.ttrpg.service: mobile
      com.ttrpg.version: "0.1.0"
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE_URL: "http://${LAN_HOST:-127.0.0.1}:5294"
      MOBILE_VERSION: "0.1.0"
    ports:
      - "0.0.0.0:3001:3001"
    depends_on:
      - api

  ollama:
    image: ollama/ollama:latest
    labels:
      com.ttrpg.service: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull the default models on first start — comment out to skip
    # entrypoint: ["sh", "-c", "ollama serve & sleep 5 && ollama pull mistral:7b-instruct && ollama pull nomic-embed-text && wait"]

  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    labels:
      com.ttrpg.service: llm
      com.ttrpg.version: "0.1.0"
    environment:
      DATABASE_URL: "postgresql+asyncpg://ttrpg:ttrpg_dev@postgres:5432/ttrpg"
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: nomic-embed-text
      LLM_MODEL: "mistral:7b-instruct"
      LLM_VERSION: "0.1.0"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - ollama
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  ollama_data:
